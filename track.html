 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Service - C&J Vehicle Service Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      padding: 0;
    }

    .nav-toggler {
      display: none;
      font-size: 28px;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: #333;
      color: white;
      flex-wrap: wrap;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      height: auto;
      width: 150px;
      margin-right: 10px;
    }

    .brand-name {
      font-family: 'Pacifico', cursive;
      font-size: 24px;
      margin-left: 10px;
      color: white;
    }

    nav {
      display: flex;
      gap: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .nav-toggler {
        display: block;
      }

      nav {
        display: none;
        flex-direction: column;
        width: 100%;
        background-color: #444;
        margin-top: 10px;
        padding: 10px;
      }

      nav.active {
        display: flex;
      }

      nav a {
        padding: 10px 0;
      }
    }

    .track-form-section {
      max-width: 600px;
      margin: 100px auto 40px;
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .track-form-section h2 {
      font-family: 'Pacifico', cursive;
      text-align: center;
      margin-bottom: 20px;
    }

    .track-form-section label {
      font-weight: bold;
    }

    .track-form-section input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .track-form-section button {
      background-color: #e76f51;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    .track-form-section button:hover {
      background-color: #f4a261;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #333;
      color: white;
      font-family: 'Roboto', sans-serif;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="navbar">
    <div class="logo-container">
      <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
        <img src="images/logo.png" alt="C&J Logo" class="logo">
        <span class="brand-name">C&J Vehicle Service Center</span>
      </a>
    </div>

    <button class="nav-toggler" data-nav-toggler>☰</button>

    <nav data-navbar>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact Us</a>
      <a href="faq.html">FAQ</a>
      <a href="feedback_form.html">Feedback</a>
      <a href="book_service.html">Book Service</a>
      <a href="track.html">Track Status</a>
      <a href="employee_login.html">Employee Login</a>
    </nav>
  </header>

  <!-- Track Service Form -->
  <section class="track-form-section">
    <h2>Track Your Service</h2>
    <form action="get_status.php" method="POST">
      <label for="registration_number">Vehicle Registration Number</label>
      <input type="text" id="registration_number" name="registration_number" placeholder="e.g. RJ14AB1234" required>
      <button type="submit">Check Status</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 C&J Vehicle Service Center. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script>
    const navbar = document.querySelector("[data-navbar]");
    const navToggler = document.querySelector("[data-nav-toggler]");

    navToggler.addEventListener("click", function () {
      navbar.classList.toggle("active");
      this.classList.toggle("active");
    });
  </script>
</body>
</html>
